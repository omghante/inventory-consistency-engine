name: Benchmark
on:
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: mvn compile -B -q
      - run: java -cp target/classes com.cascade.demo.ConcurrencyBenchmark
